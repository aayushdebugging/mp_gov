name: Deploy to GitHub Pages

# Pushes `public/` to the `gh-pages` branch. You then host the site with:
# Settings → Pages → Build and deployment → Deploy from a branch → gh-pages / (root).
# This avoids the GitHub Actions Pages API that returns "Get Pages site failed" until
# Pages is pre-configured for "GitHub Actions" deployments.

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
